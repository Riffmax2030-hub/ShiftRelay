<!doctype html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width,initial-scale=1" /><title>Delete your ShiftRelay account</title><link rel="stylesheet" href="legal.css" /></head><body><main class="legal"><a class="brand" href="/"><span>↝</span>ShiftRelay</a><h1>Request account deletion</h1><p>Use the email address on your ShiftRelay account. We will verify the request before deleting personal account data. Some operational records may be retained only where required for legal, safety, or audit obligations.</p><form class="form" id="deletion-form"><label>Email address<input name="email" type="email" required autocomplete="email" /></label><label>Reason (optional)<textarea name="reason"></textarea></label><button type="submit">Request deletion</button><p class="message" id="message"></p></form><p><a href="privacy.html">Privacy Policy</a> · <a href="terms.html">Terms of Service</a></p></main><script>document.querySelector('#deletion-form').addEventListener('submit',async event=>{event.preventDefault();const message=document.querySelector('#message');const response=await fetch('/api/account-deletion-requests',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(event.currentTarget)))});const data=await response.json();message.textContent=response.ok?'Your deletion request was received. We will contact you at the submitted email.':data.error})</script></body></html>
