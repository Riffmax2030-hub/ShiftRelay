<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="apple-touch-icon" href="icon.svg" />
    <meta name="theme-color" content="#126e68" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="description" content="ShiftRelay gives frontline teams accountable shift handovers." />
    <title>ShiftRelay | Work moves forward</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="bento-ui.css" />
    <link rel="stylesheet" href="portal.css" />
    <link rel="stylesheet" href="approval.css" />
    <link rel="stylesheet" href="worker.css" />
    <link rel="stylesheet" href="assistant.css" />
    <link rel="stylesheet" href="quote.css" />
    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="profile.css" />
    <link rel="stylesheet" href="account-menu.css" />
    <link rel="stylesheet" href="metrics.css" />
    <link rel="stylesheet" href="notification-ui.css" />
    <link rel="stylesheet" href="notification-experience.css" />
    <link rel="stylesheet" href="language.css" />
    <link rel="stylesheet" href="preferences.css" />
    <link rel="stylesheet" href="calendar-experience.css" />
    <link rel="stylesheet" href="community-experience.css" />
    <link rel="stylesheet" href="community-overrides.css" />
    <link rel="stylesheet" href="direct-messages.css" />
    <link rel="stylesheet" href="onboarding-experience.css" />
    <link rel="stylesheet" href="checklists.css" />
    <link rel="stylesheet" href="bento-ui.css" />
  </head>
  <body>
    <main class="login-page" id="login-view">
      <section class="login-intro">
        <a class="brand" href="#"><img src="icon.svg" alt="" />ShiftRelay</a>
        <p class="eyebrow">WORKPLACE HANDOVER SYSTEM</p>
        <h1>Every shift starts<br />with the full picture.</h1>
        <p>ShiftRelay turns rushed updates into clear work that the next person can trust, review, and act on.</p>
        <div class="workflow-line"><b>Capture</b><i></i><b>Review</b><i></i><b>Acknowledge</b></div>
        <div class="landing-actions"><button class="primary" data-access="register">Register your organisation</button><button class="secondary" data-access="join">Join with organisation ID</button></div>
      </section>
      <section class="login-panel" id="access-panel"></section>
    </main>

    <main class="app hidden" id="app-view">
      <aside class="sidebar">
        <a class="brand" href="#"><img src="icon.svg" alt="" />ShiftRelay</a>
        <div class="signed-in"><span class="avatar" id="sidebar-avatar">AO</span><div><strong id="sidebar-name"></strong><small id="sidebar-role"></small></div></div>
        <nav class="side-nav"><button class="active" data-view="dashboard">Dashboard</button><button data-view="handover">New handover</button><button data-view="activity">Activity</button><button data-view="notifications">Notifications</button><button data-view="calendar">Calendar</button><button data-view="community">Community</button><button data-view="people">Staffs</button><button data-view="workflows">Workflows</button><button data-view="analytics">Analytics</button><button data-view="incidents">Incidents</button><button data-view="settings">Settings</button></nav>
        <button class="logout" id="logout-button">Switch role</button>
      </aside>
      <section class="main-content">
        <header class="app-header"><div><p class="eyebrow" id="page-kicker">YOUR WORKSPACE</p><h1 id="page-title">Dashboard</h1></div><div class="header-actions"><span class="api-status" id="api-status">Checking AI connection…</span><button class="bell notification-trigger" id="notification-button" aria-label="Open notifications"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4" /></svg><b id="notification-count">0</b></button><button class="account-menu-button" id="account-menu-button" aria-label="Open account menu" aria-expanded="false">☰</button></div></header>
        <section id="dashboard"></section>
      </section>
      <nav class="mobile-nav" aria-label="Primary navigation">
        <button data-go="dashboard" class="active"><span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8v9a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1v-9Z"/></svg></span><small>Today</small></button>
        <button data-go="activity"><span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 12h3l2-6 4 12 2-6h5"/></svg></span><small>Pulse</small></button>
        <button data-go="handover" class="relay-tab"><span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h10a4 4 0 0 1 4 4v1"/><path d="m15 9 4 3-4 3"/><path d="M19 17H9a4 4 0 0 1-4-4v-1"/><path d="m9 15-4-3 4-3"/></svg></span><small>Relay</small></button>
        <button data-go="calendar"><span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M7 3v4M17 3v4M3 10h18M7 14h3M14 14h3M7 17h3"/></svg></span><small>Shifts</small></button>
        <button data-go="community"><span class="tab-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11.5a7.5 7.5 0 0 1-8 7.5 8.5 8.5 0 0 1-4-.9L4 20l1.3-3.4A7.3 7.3 0 0 1 4 12.5 7.5 7.5 0 0 1 12 5a7.5 7.5 0 0 1 8 6.5Z"/><path d="M8 12h.01M12 12h.01M16 12h.01"/></svg></span><small>Team</small></button>
      </nav>
      <aside class="notification-panel hidden" id="notification-panel"><div><strong>Notifications</strong></div><section id="notification-list"></section></aside>
    </main>
    <div class="toast hidden" id="toast"></div>
    <script src="language.js"></script>
    <script src="language-pack.js"></script>
    <script src="app.js"></script>
    <script src="notifications.js"></script>
   <script src="profile.js"></script>
   <script src="checklists.js"></script>
    <script src="attendance.js"></script>
    <script src="account-menu.js"></script>
    <script src="calendar-experience.js"></script>
    <script src="notification-experience.js"></script>
    <script src="community-experience.js"></script>
    <script src="schedule-import.js"></script>
    <script src="direct-messages.js"></script>
    <script src="team-realtime.js"></script>
<script src="onboarding-experience.js"></script>
<script src="navigation-fix.js"></script>
    <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/service-worker.js?v=34',{updateViaCache:'none'}).then((registration)=>registration.update()).catch(()=>{});</script>
  </body>
</html>
