    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <body>
    <main class="login-page" id="login-view">
      <section class="login-intro">
        <a class="brand" href="#"><span>↝</span>ShiftRelay</a>
        <p class="eyebrow">WORKPLACE HANDOVER SYSTEM</p>
        <h1>Every shift starts<br />with the full picture.</h1>
        <p>ShiftRelay turns rushed updates into clear work that the next person can trust, review, and act on.</p>
        <div class="workflow-line"><b>Capture</b><i></i><b>Review</b><i></i><b>Acknowledge</b></div>
        <div class="landing-actions"><button class="primary" data-access="register">Register your organisation</button><button class="secondary" data-access="join">Join with organisation ID</button></div>
      </section>
      <section class="login-panel" id="access-panel"></section>
    </main>

    <main class="app hidden" id="app-view">
      <aside class="sidebar">
        <a class="brand" href="#"><span>↝</span>ShiftRelay</a>
        <div class="signed-in"><span class="avatar" id="sidebar-avatar">AO</span><div><strong id="sidebar-name"></strong><small id="sidebar-role"></small></div></div>
        <nav class="side-nav"><button class="active" data-view="dashboard">Dashboard</button><button data-view="handover">New handover</button><button data-view="activity">Activity</button><button data-view="notifications">Notifications</button><button data-view="calendar">Calendar</button><button data-view="community">Community</button><button data-view="people">Staffs</button><button data-view="workflows">Workflows</button><button data-view="analytics">Analytics</button><button data-view="incidents">Incidents</button><button data-view="settings">Settings</button></nav>
        <button class="logout" id="logout-button">Switch role</button>
      </aside>
      <section class="main-content">
        <header class="app-header"><div><p class="eyebrow" id="page-kicker">YOUR WORKSPACE</p><h1 id="page-title">Dashboard</h1></div><div class="header-actions"><span class="api-status" id="api-status">Checking AI connection…</span><button class="bell notification-trigger" id="notification-button" aria-label="Open notifications"><svg aria-hidden="true" viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9M10 21h4" /></svg><b id="notification-count">0</b></button><button class="account-menu-button" id="account-menu-button" aria-label="Open account menu" aria-expanded="false">☰</button></div></header>
        <section id="dashboard"></section>
      </section>
      <aside class="notification-panel hidden" id="notification-panel"><div><strong>Notifications</strong></div><section id="notification-list"></section></aside>
    </main>
    <div class="toast hidden" id="toast"></div>
    <script src="language.js"></script>
    <script src="language-pack.js"></script>
    <script src="app.js"></script>
    <script src="notifications.js"></script>
   <script src="profile.js"></script>
   <script src="checklists.js"></script>
    <script src="attendance.js"></script>
    <script src="account-menu.js"></script>
    <script src="calendar-experience.js"></script>
    <script src="notification-experience.js"></script>
    <script src="community-experience.js"></script>
    <script src="schedule-import.js"></script>
    <script src="direct-messages.js"></script>
<script src="onboarding-experience.js"></script>
<script src="navigation-fix.js"></script>
    <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/service-worker.js').catch(()=>{});</script>
